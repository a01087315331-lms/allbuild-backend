    <meta charset="UTF-8">
    <title>자재 주문요청서 작성 프로그램 (결재란 포함)</title>
    <!-- [보안 우회 브릿지] 로컬 file:/// 실행 시 카카오 주소 API의 postMessage 통신 차단을 우회하기 위해,
         실행 중인 올빌드 로컬 서버(http://localhost:5000)를 감지하여 웹 도메인 주소로 자동 리다이렉트합니다. -->
    <script>
        (function() {
            if (window.location.protocol === 'file:') {
                // 로컬 서버의 헬스체크 API를 호출하여 서버가 가동 중인지 확인합니다.
                const checkUrl = 'https://allbuild-backend.onrender.com/api/health';
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1500); // 1.5초 타임아웃
                
                fetch(checkUrl, { signal: controller.signal })
                    .then(response => response.json())
                    .then(data => {
                        clearTimeout(timeoutId);
                        if (data && data.status === 'ok') {
                            // 로컬 서버가 가동 중이므로, 해당 서버 도메인의 템플릿 정적 서빙 경로로 주소를 강제 전환합니다.
                            window.location.replace('https://allbuild-backend.onrender.com/templates/자재주문요청서_양식.html?v=' + Date.now());
                        }
                    })
                    .catch(error => {
                        // 서버가 미가동 상태인 경우, 사용자 편의를 위해 화면 상단에 경고 안내 플로팅 배너를 출력합니다.
                        console.warn('[알림] 올빌드 로컬 서버가 구동되고 있지 않아 주소 자동 입력 기능이 작동하지 않습니다.');
                        window.addEventListener('DOMContentLoaded', () => {
                            const banner = document.createElement('div');
                            banner.style.cssText = 'background-color: #fef3c7; color: #92400e; border: 1px solid #fde68a; padding: 12px; text-align: center; font-weight: bold; font-size: 0.95rem; position: sticky; top: 0; z-index: 99999;';
                            banner.innerHTML = '⚠️ <b>알림:</b> 올빌드 서버(올빌드_서버_실행.bat)가 실행 중이 아닙니다. 서버를 가동하신 후 이 파일을 다시 열어야 주소 찾기 후 <b>[자동 주소 입력]</b>이 정상적으로 작동합니다.';
                            document.body.insertBefore(banner, document.body.firstChild);
                        });
                    });
            }
        })();
    </script>

<script>
    // [압축 보관소] 사용자가 등록하고 압축을 완료한 이미지 Blob 파일들을 저장하는 전역 메모리 배열입니다.
    var uploadedCompressedFiles = [];
    
    // 현장명 입력 시 페이지의 현장명 정보 자동 동기화
    function syncSiteName() {
        var inputVal = document.getElementById('siteNameInput').value;
        var defaultText = "[ 현장명을 입력하세요 ]";
        var targets = document.getElementsByClassName('mirrorSiteNameClass');
        for (var i = 0; i < targets.length; i++) {
            targets[i].innerText = inputVal ? inputVal + " 현장" : defaultText;
        }
    }

    // [교육용 주소] 고화질 원본 이미지를 받아 가로세로 최대 800px로 리사이징하고, JPEG 품질 0.5로 대폭 압축하는 유틸리티 함수
    function compressImageFile(file, callback) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
                var canvas = document.createElement('canvas');
                var maxDimension = 600; // 최대 해상도를 600px로 낮춰 전송 속도를 대폭 개선합니다.
                var width = img.width;
                var height = img.height;

                // 종횡비를 유지하면서 크기를 조정합니다.
                if (width > height) {
                    if (width > maxDimension) {
                        height = Math.round((height * maxDimension) / width);
                        width = maxDimension;
                    }
                } else {
                    if (height > maxDimension) {
                        width = Math.round((width * maxDimension) / height);
                        height = maxDimension;
                    }
                }

                canvas.width = width;
                canvas.height = height;

                var ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // 화질을 30% 수준으로 강력 압축하여 장당 수십 KB 크기로 초경량 전송을 보장합니다.
                if (canvas.toBlob) {
                    canvas.toBlob(function(blob) {
                        callback(blob);
                    }, 'image/jpeg', 0.3);
                } else {
                    // 구형 브라우저 지원용 폴백 (dataURL 변환 후 Blob 변환)
                    var dataUrl = canvas.toDataURL('image/jpeg', 0.3);
                    var blob = dataURLToBlob(dataUrl);
                    callback(blob);
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // dataURL을 Blob 객체로 변환해주는 헬퍼 함수
    function dataURLToBlob(dataUrl) {
        var parts = dataUrl.split(',');
        var mime = parts[0].match(/:(.*?);/)[1];
        var bstr = atob(parts[1]);
        var n = bstr.length;
        var u8arr = new Uint8Array(n);
        while(n--) {
            u8arr[n] = bstr.charCodeAt(n);
        }
        return new Blob([u8arr], {type:mime});
    }

    // 파일 로컬 읽기 및 업로드 미리보기 관리 함수 (압축 로직 탑재)
    function handleImageUpload(inputElement, previewTargetId) {
        var files = inputElement.files;
        var previewZone = document.getElementById(previewTargetId);
        
        // 사용자가 파일을 선택한 뒤 input 필드를 초기화하여 동일 파일을 다시 선택해도 이벤트가 발생하도록 합니다.
        var fileList = Array.prototype.slice.call(files);
        inputElement.value = ''; 

        fileList.forEach(function(file) {
            if (!file.type.match('image.*')) {
                alert('이미지 파일만 등록할 수 있습니다.');
                return;
            }

            // 고유한 파일 임시 식별 ID를 타임스탬프 기반으로 생성합니다.
            var tempFileId = 'img_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            // 1. 먼저 사용자 화면에 압축 대기 중인 상태를 표시합니다.
            var wrapper = document.createElement('div');
            wrapper.className = 'img-wrapper';
            wrapper.id = tempFileId;
            wrapper.style.opacity = '0.5'; // 압축 중일 때는 투명도를 줘서 처리 중임을 알립니다.

            var loadingText = document.createElement('div');
            loadingText.className = 'loading-indicator';
            loadingText.innerText = '압축 중...';
            loadingText.style.cssText = 'position: absolute; top: 40%; left: 0; right: 0; text-align: center; color: #2563eb; font-weight: bold; font-size: 0.85rem;';
            wrapper.appendChild(loadingText);
            previewZone.appendChild(wrapper);

            // 2. 백그라운드 이미지 압축을 수행합니다.
            compressImageFile(file, function(compressedBlob) {
                // 압축 완료된 Blob에 원본 파일명을 붙여서 전송용으로 포장합니다.
                compressedBlob.name = file.name;
                
                // 전역 압축 파일 관리 배열에 저장하고, DOM 래퍼 객체에도 식별 정보를 넣습니다.
                uploadedCompressedFiles.push({
                    id: tempFileId,
                    blob: compressedBlob
                });

                // 화면에 압축된 결과물 미리보기를 출력하고 로딩 상태를 해제합니다.
                var reader = new FileReader();
                reader.onload = function(event) {
                    // 기존 로딩 문구 제거
                    if (wrapper.contains(loadingText)) {
                        wrapper.removeChild(loadingText);
                    }
                    wrapper.style.opacity = '1.0'; // 로딩 투명도 제거

                    var img = document.createElement('img');
                    img.src = event.target.result;
                    
                    var delBtn = document.createElement('button');
                    delBtn.className = 'del-btn';
                    delBtn.innerText = '삭제';
                    delBtn.type = 'button'; // 기본 submit 방지
                    delBtn.onclick = function() {
                        // 전역 관리 리스트에서 해당 이미지를 제거합니다.
                        uploadedCompressedFiles = uploadedCompressedFiles.filter(function(item) {
                            return item.id !== tempFileId;
                        });
                        // 화면에서 미리보기 상자를 삭제합니다.
                        wrapper.parentNode.removeChild(wrapper);
                    };
                    
                    wrapper.appendChild(img);
                    wrapper.appendChild(delBtn);
                };
                reader.readAsDataURL(compressedBlob);
            });
        });
    }

    // [UX 개선] 입력 폼 내에서 엔터 키를 쳤을 때 의도치 않게 인쇄되거나 폼 전송이 튕겨버리는 것을 막습니다.
    document.getElementById('orderForm').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
            e.preventDefault(); // 엔터 기본 동작 차단
            return false;
        }
    });

    // 최종 주문 제출 함수 (비동기 Fetch 및 리다이렉트)
    function submitOrder() {
        try {
            var btn = document.getElementById('realSubmitBtn');
            var originalText = '🚀 올빌드 본사로 주문 최종전송';

            var form = document.getElementById('orderForm');
            var items = [];
            var rows = document.getElementById('page1Body').getElementsByTagName('tr');
            var hasValidItem = false;

            for (var i = 0; i < rows.length; i++) {
                var row = rows[i];
                var nameInput = row.querySelector('.material-name');
                var specInput = row.querySelector('.material-spec');
                var unitInput = row.querySelector('.material-unit');
                var qtyInput = row.querySelector('.material-qty');
                var remarkInput = row.querySelector('.material-remark');

                if (nameInput && qtyInput && nameInput.value.trim() && qtyInput.value) {
                    hasValidItem = true;
                    var qty = parseFloat(qtyInput.value) || 1;
                    var remark = remarkInput && remarkInput.value ? remarkInput.value.trim() : '';
                    
                    items.push({
                        mall_name: '현장직접입력',
                        product_name: nameInput.value.trim() + (remark ? ' [비고: ' + remark + ']' : ''),
                        price: 0,
                        tax: 0,
                        shipping_fee: 0,
                        spec: specInput && specInput.value ? specInput.value.trim() : '일반규격',
                        unit: unitInput && unitInput.value ? unitInput.value.trim() : '개',
                        qty: qty,
                        quantity: qty // [호환성 추가] 구버전 및 신버전 파서 모두 호환되도록 수량 필드를 이중 지원합니다.
                    });
                }
            }

            if (!hasValidItem) {
                alert("품명과 수량을 최소 한 줄 이상 정확하게 입력하세요!");
                return;
            }

            var fullAddrInput = document.getElementById('full_address');
            var unloadingInput = document.getElementById('unloading_place');
            var receiverInput = document.getElementById('receiver_info');

            var fullAddr = fullAddrInput && fullAddrInput.value ? fullAddrInput.value.trim() : '';
            var unloading = unloadingInput && unloadingInput.value ? unloadingInput.value.trim() : '';
            var receiver = receiverInput && receiverInput.value ? receiverInput.value.trim() : '';

            if (!fullAddr) {
                alert("배송을 위해 납품 주소를 입력하세요!");
                return;
            }

            var finalAddress = fullAddr;
            if (unloading) finalAddress += ' [하차지: ' + unloading + ']';
            if (receiver) finalAddress += ' [인수안내: ' + receiver + ']';

            // Hidden fields 값 설정
            var addressInput = document.getElementById('addressInput');
            if (addressInput) addressInput.value = finalAddress;
            
            var itemsInput = document.getElementById('itemsInput');
            if (itemsInput) itemsInput.value = JSON.stringify(items);
            
            var siteNameHidden = document.getElementById('siteNameHidden');
            if(siteNameHidden) siteNameHidden.value = document.getElementById('siteNameInput') ? document.getElementById('siteNameInput').value : '';
            
            var requesterHidden = document.getElementById('requesterHidden');
            if(requesterHidden) requesterHidden.value = document.getElementById('requesterInput') ? document.getElementById('requesterInput').value : '';
            
            var phoneHidden = document.getElementById('phoneHidden');
            if(phoneHidden) phoneHidden.value = document.getElementById('requester_phone') ? document.getElementById('requester_phone').value : '';

            // 버튼 로딩 상태 표시
            btn.innerText = '서버로 전송 중입니다...';
            btn.style.backgroundColor = '#4b5563';
            btn.disabled = true;

            // [보안 우회] DataTransfer API를 활용하여 메모리에 보존된 압축 이미지(Blob)들을 
            // 파일 입력 필드(imgLoader1)에 강제 맵핑합니다. 이를 통해 CORS 제한을 받지 않고
            // 폼을 동기식으로 서버로 날릴 수 있습니다.
            if (uploadedCompressedFiles.length > 0) {
                var dataTransfer = new DataTransfer();
                uploadedCompressedFiles.forEach(function(item) {
                    // Blob을 File 객체로 승격합니다.
                    var compressedFile = new File([item.blob], item.blob.name, { type: 'image/jpeg' });
                    dataTransfer.items.add(compressedFile);
                });
                
                var fileInput = document.getElementById('imgLoader1');
                if (fileInput) {
                    fileInput.files = dataTransfer.files;
                }
            }

            // 폼의 전송 목적지(Action)를 동적으로 재보정합니다.
            var apiHost = '%%API_HOST%%';
            if (apiHost.indexOf('%API_HOST%') !== -1) {
                apiHost = window.location.protocol === 'file:' ? 'https://allbuild-backend.onrender.com' : window.location.origin;
            }
            form.action = apiHost + '/api/parser/submit-form';

            // 동기적으로 폼을 서버에 직접 제출합니다. (CORS 보안 우회 완료!)
            HTMLFormElement.prototype.submit.call(form);

        } catch (error) {
            alert('자바스크립트 오류 발생: ' + error.message);
            console.error(error);
        }
    }
</script>
